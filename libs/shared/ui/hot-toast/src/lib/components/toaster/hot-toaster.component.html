@for (position of positions; track position) {
  @let positionedToasts = toastGroups() | hotToastPositionedToasts: position : reverseOrder();

  @if (positionedToasts.length) {
    <div
      [class]="position | hotToastPlacementClass: containerClassName()"
      [ngStyle]="containerStyle()"
      [style.gap.px]="gutter()"
      (mouseenter)="startPause()"
      (mouseleave)="endPause()"
      (focusin)="startPause()"
      (focusout)="endPause()"
    >
      @for (toast of positionedToasts; track toast.id) {
        <lib-hot-toast-item [toast]="toast" />
      }
    </div>
  }
}
